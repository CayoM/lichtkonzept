server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Sicherheits-Header
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Trailing slash / clean URLs
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Statische Assets — long cache
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg|jpg|jpeg|png|webp|avif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML — kein Cache (für GH Pages parity)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss application/xml image/svg+xml;
    gzip_min_length 1024;
}
