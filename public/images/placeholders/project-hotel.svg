<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Hotel-Foyer mit Pendelleuchten-Cluster über Empfangstresen">
  <defs>
    <linearGradient id="ph-bg" x1="0" y1="0" x2="0" y2="100%"><stop offset="0%" stop-color="#15120e"/><stop offset="100%" stop-color="#0a0807"/></linearGradient>
    <radialGradient id="ph-pendant" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ffe6b5" stop-opacity="0.9"/><stop offset="100%" stop-color="#000" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1600" height="1100" fill="url(#ph-bg)"/>
  <!-- Empfangstresen -->
  <rect x="200" y="700" width="1200" height="180" fill="#1a1410"/>
  <rect x="200" y="700" width="1200" height="10" fill="#3a2818"/>
  <!-- Cluster aus Pendeln -->
  <g>
    <line x1="500" y1="0" x2="500" y2="380" stroke="#2a1d12" stroke-width="1"/>
    <circle cx="500" cy="400" r="18" fill="#1a0f07"/>
    <ellipse cx="500" cy="420" rx="80" ry="60" fill="url(#ph-pendant)"/>
  </g>
  <g>
    <line x1="700" y1="0" x2="700" y2="280" stroke="#2a1d12" stroke-width="1"/>
    <circle cx="700" cy="300" r="18" fill="#1a0f07"/>
    <ellipse cx="700" cy="320" rx="80" ry="60" fill="url(#ph-pendant)"/>
  </g>
  <g>
    <line x1="900" y1="0" x2="900" y2="340" stroke="#2a1d12" stroke-width="1"/>
    <circle cx="900" cy="360" r="18" fill="#1a0f07"/>
    <ellipse cx="900" cy="380" rx="80" ry="60" fill="url(#ph-pendant)"/>
  </g>
  <g>
    <line x1="1100" y1="0" x2="1100" y2="240" stroke="#2a1d12" stroke-width="1"/>
    <circle cx="1100" cy="260" r="18" fill="#1a0f07"/>
    <ellipse cx="1100" cy="280" rx="80" ry="60" fill="url(#ph-pendant)"/>
  </g>
  <!-- Reflexion -->
  <ellipse cx="800" cy="720" rx="500" ry="20" fill="#f4d5a5" opacity="0.18"/>
</svg>
